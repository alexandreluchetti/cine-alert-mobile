name: cine_alert
description: CineAlert - Movie & Series Reminder App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.4.0
  riverpod_annotation: ^2.3.3

  # Navigation
  go_router: ^17.1.0

  # HTTP Client
  dio: ^5.4.0

  # Firebase
  firebase_core: ^4.5.0
  firebase_messaging: ^16.1.2
  firebase_auth: ^6.2.0

  # Local Notifications
  flutter_local_notifications: ^21.0.0

  # Local Storage
  hive_flutter: ^1.1.0

  # Image
  cached_network_image: ^3.3.1
  image_picker: ^1.0.7

  # Animations
  flutter_animate: ^4.3.0

  # Utils
  intl: ^0.20.2
  shared_preferences: ^2.2.2
  url_launcher: ^6.2.4

  # Icons
  cupertino_icons: ^1.0.6
  flutter_svg: ^2.0.9
  timezone: ^0.11.0
  flutter_timezone: ^5.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.7
  riverpod_generator: ^2.3.9
  hive_generator: ^2.0.1
  json_serializable: ^6.7.1
  mockito: ^5.4.4

flutter:
  uses-material-design: true

